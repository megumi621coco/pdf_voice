<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PDF音読アプリ</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg: #0f0f23;
      --surface: #1c1c3a;
      --accent: #7c6fff;
      --accent-light: #a89eff;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --highlight-bg: rgba(124, 111, 255, 0.18);
      --highlight-border: #7c6fff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 560px;
      margin: 0 auto;
      padding: 16px 16px 32px;
    }

    header { text-align: center; padding: 12px 0 20px; }
    header h1 { font-size: 20px; color: var(--accent-light); letter-spacing: 0.03em; }
    header p  { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* ========== UPLOAD SCREEN ========== */
    #upload-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 72vh;
      gap: 16px;
    }

    .upload-card {
      width: 100%;
      border: 2px dashed var(--accent);
      border-radius: 20px;
      padding: 52px 24px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      user-select: none;
    }
    .upload-card:hover, .upload-card.drag-over {
      background: rgba(124, 111, 255, 0.08);
      border-color: var(--accent-light);
    }
    .upload-card .icon  { font-size: 56px; margin-bottom: 16px; }
    .upload-card .label { font-size: 18px; margin-bottom: 8px; }
    .upload-card .sub   { font-size: 13px; color: var(--text-muted); }

    #file-input { display: none; }

    /* 続きから再生バナー */
    #resume-banner {
      display: none;
      width: 100%;
      background: rgba(124, 111, 255, 0.15);
      border: 1px solid var(--accent);
      border-radius: 14px;
      padding: 14px 16px;
      text-align: center;
    }
    #resume-banner p   { font-size: 14px; margin-bottom: 10px; color: var(--text); }
    #resume-banner small { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 10px; }
    .resume-btns { display: flex; gap: 8px; justify-content: center; }
    .btn-resume {
      padding: 8px 20px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-resume.primary   { background: var(--accent); color: white; }
    .btn-resume.secondary { background: #2a2a4a; color: var(--text-muted); border: 1px solid #444; }

    /* ========== PLAYER SCREEN ========== */
    #player-screen { display: none; flex-direction: column; gap: 14px; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; }
    .filename {
      font-size: 13px; color: var(--text-muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%;
    }
    .btn-text {
      background: none; border: 1px solid #444; border-radius: 8px;
      color: var(--text-muted); padding: 5px 12px; font-size: 13px; cursor: pointer;
    }

    .tts-badge {
      text-align: center; font-size: 11px; padding: 3px 10px;
      border-radius: 12px; display: inline-block;
    }
    .tts-badge.voicevox { background: rgba(124,111,255,0.2); color: var(--accent-light); }
    .tts-badge.fallback { background: rgba(255,180,0,0.15); color: #ffcc44; }
    .tts-badge-row { text-align: center; }

    .progress-bar {
      width: 100%; height: 5px; background: #2a2a4a; border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      border-radius: 3px; transition: width 0.4s;
    }
    .progress-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-align: right; }

    .text-display {
      background: var(--surface); border-radius: 16px;
      padding: 16px; height: 38vh; overflow-y: auto; scroll-behavior: smooth;
    }

    .para-item {
      padding: 9px 12px; border-radius: 10px; margin-bottom: 6px;
      cursor: pointer; color: var(--text-muted); font-size: 15px;
      line-height: 1.75; transition: background 0.15s, color 0.15s;
      border-left: 3px solid transparent;
    }
    .para-item:hover { background: rgba(255,255,255,0.04); }
    .para-item.active {
      background: var(--highlight-bg);
      border-left-color: var(--highlight-border);
      color: var(--text);
    }
    .para-item.done { color: #555577; }

    .controls-card {
      background: var(--surface); border-radius: 16px;
      padding: 20px; display: flex; flex-direction: column; gap: 18px;
    }

    .main-controls { display: flex; justify-content: center; align-items: center; gap: 20px; }

    .btn-circle {
      border: none; background: none; cursor: pointer; color: var(--text);
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; flex-shrink: 0;
      transition: transform 0.1s, background 0.15s;
    }
    .btn-circle:active { transform: scale(0.88); }

    .btn-sm   { width: 48px; height: 48px; font-size: 22px; }
    .btn-play { width: 72px; height: 72px; font-size: 30px; background: var(--accent); }
    .btn-play:hover { background: var(--accent-light); }
    .btn-skip { background: rgba(124,111,255,0.12); }
    .btn-skip:hover { background: rgba(124,111,255,0.25); }

    .speed-row { display: flex; align-items: center; gap: 12px; }
    .speed-row label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
    .speed-val { font-size: 16px; font-weight: bold; color: var(--accent-light); min-width: 38px; text-align: right; }

    input[type="range"] {
      flex: 1; -webkit-appearance: none;
      height: 4px; background: #2a2a4a; border-radius: 2px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      background: var(--accent); border-radius: 50%; cursor: pointer;
      box-shadow: 0 0 0 3px rgba(124,111,255,0.2);
    }

    .voice-row { display: flex; align-items: center; gap: 10px; }
    .voice-row label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
    select.voice-select {
      flex: 1; background: #2a2a4a; border: 1px solid #444;
      border-radius: 8px; color: var(--text); padding: 8px 10px; font-size: 14px;
    }

    .page-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
    .btn-page {
      background: #2a2a4a; border: 1px solid #444; border-radius: 10px;
      color: var(--text); padding: 10px 18px; font-size: 14px; cursor: pointer;
    }
    .btn-page:active { background: rgba(124,111,255,0.25); }
    .page-info { font-size: 14px; color: var(--text-muted); min-width: 80px; text-align: center; }

    /* ========== OVERLAYS ========== */
    #loading-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(15,15,35,0.92);
      justify-content: center; align-items: center;
      flex-direction: column; gap: 16px; z-index: 300;
    }
    #loading-overlay.show { display: flex; }
    .spinner {
      width: 42px; height: 42px;
      border: 3px solid #333; border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { font-size: 15px; color: var(--text-muted); }

    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #2a2a4a; border: 1px solid #444; color: var(--text);
      padding: 10px 22px; border-radius: 24px; font-size: 14px;
      opacity: 0; transition: opacity 0.3s; z-index: 400;
      white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>📖 PDF音読アプリ</h1>
  <p>PDFを読み込んで、耳で学習しよう</p>
</header>

<!-- Upload screen -->
<div id="upload-screen">
  <div class="upload-card" id="upload-card">
    <div class="icon">📄</div>
    <div class="label">PDFをタップして選択</div>
    <div class="sub">またはここにドラッグ＆ドロップ</div>
  </div>
  <input type="file" id="file-input" accept=".pdf">

  <!-- 続きから再生バナー -->
  <div id="resume-banner">
    <p id="resume-title"></p>
    <small id="resume-info"></small>
    <div class="resume-btns">
      <button class="btn-resume primary"   id="resume-yes">続きから再生</button>
      <button class="btn-resume secondary" id="resume-no">最初から</button>
    </div>
  </div>
</div>

<!-- Player screen -->
<div id="player-screen">
  <div class="top-bar">
    <span class="filename" id="filename"></span>
    <button class="btn-text" id="new-file-btn">別のPDF</button>
  </div>

  <div class="tts-badge-row">
    <span class="tts-badge voicevox" id="tts-badge">🎙 VOICEVOX（自然音声）</span>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">0 / 0 段落</div>
  </div>

  <div class="text-display" id="text-display"></div>

  <div class="controls-card">
    <div class="main-controls">
      <button class="btn-circle btn-sm btn-skip" id="prev-btn">⏮</button>
      <button class="btn-circle btn-play" id="play-btn">▶</button>
      <button class="btn-circle btn-sm btn-skip" id="next-btn">⏭</button>
    </div>

    <div class="speed-row">
      <label>速度</label>
      <input type="range" id="speed-slider" min="5" max="25" value="10" step="1">
      <span class="speed-val" id="speed-val">1.0x</span>
    </div>

    <div class="voice-row">
      <label>声</label>
      <select class="voice-select" id="voice-select">
        <option value="3">ずんだもん（女性）</option>
        <option value="0">四国めたん（女性）</option>
        <option value="8">春日部つむぎ（女性）</option>
        <option value="11">玄野武宏（男性）</option>
        <option value="13">青山龍星（男性）</option>
      </select>
    </div>

    <div class="page-row">
      <button class="btn-page" id="prev-page-btn">◀ 前ページ</button>
      <span class="page-info" id="page-info">-</span>
      <button class="btn-page" id="next-page-btn">次ページ ▶</button>
    </div>
  </div>
</div>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-text">読み込み中...</div>
</div>
<div class="toast" id="toast"></div>
<audio id="audio-el" preload="auto"></audio>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  /* ===================== STATE ===================== */
  let paragraphs  = [];
  let currentIdx  = 0;
  let isPlaying   = false;
  let currentRate = 1.0;
  let speakerId   = 3;          // VOICEVOX speaker ID
  let totalPages  = 0;
  let ttsMode     = 'voicevox'; // 'voicevox' | 'webspeech'
  let prefetch    = null;
  let blobUrl     = null;
  let wsVoices    = [];         // Web Speech API の日本語音声リスト
  let wsVoiceIdx  = 0;          // 選択中の wsVoices インデックス

  const LS_KEY = 'pdf-reader-progress';

  /* ===================== DOM ===================== */
  const uploadScreen   = document.getElementById('upload-screen');
  const playerScreen   = document.getElementById('player-screen');
  const uploadCard     = document.getElementById('upload-card');
  const fileInput      = document.getElementById('file-input');
  const filenameEl     = document.getElementById('filename');
  const newFileBtn     = document.getElementById('new-file-btn');
  const ttsBadge       = document.getElementById('tts-badge');
  const progressFill   = document.getElementById('progress-fill');
  const progressLabel  = document.getElementById('progress-label');
  const textDisplay    = document.getElementById('text-display');
  const playBtn        = document.getElementById('play-btn');
  const prevBtn        = document.getElementById('prev-btn');
  const nextBtn        = document.getElementById('next-btn');
  const prevPageBtn    = document.getElementById('prev-page-btn');
  const nextPageBtn    = document.getElementById('next-page-btn');
  const speedSlider    = document.getElementById('speed-slider');
  const speedVal       = document.getElementById('speed-val');
  const voiceSelect    = document.getElementById('voice-select');
  const pageInfo       = document.getElementById('page-info');
  const loadingOverlay = document.getElementById('loading-overlay');
  const loadingText    = document.getElementById('loading-text');
  const toastEl        = document.getElementById('toast');
  const audioEl        = document.getElementById('audio-el');
  const resumeBanner   = document.getElementById('resume-banner');
  const resumeTitle    = document.getElementById('resume-title');
  const resumeInfo     = document.getElementById('resume-info');
  const resumeYes      = document.getElementById('resume-yes');
  const resumeNo       = document.getElementById('resume-no');

  /* ===================== PROGRESS (localStorage) ===================== */
  function saveProgress() {
    if (!paragraphs.length) return;
    localStorage.setItem(LS_KEY, JSON.stringify({
      filename:        filenameEl.textContent,
      currentIdx,
      totalParagraphs: paragraphs.length,
      pageNum:         paragraphs[currentIdx].pageNum,
      savedAt:         Date.now(),
    }));
  }

  function getSavedProgress() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)); }
    catch { return null; }
  }

  function clearProgress() { localStorage.removeItem(LS_KEY); }

  /* ===================== RESUME BANNER ===================== */
  // ページ読み込み時に前回の保存状態を確認
  window.addEventListener('load', () => {
    const saved = getSavedProgress();
    if (!saved) return;
    const age = (Date.now() - saved.savedAt) / 1000 / 60 / 60; // 時間
    if (age > 24 * 30) { clearProgress(); return; } // 30日超は削除

    resumeTitle.textContent = `📂 前回: ${saved.filename}`;
    resumeInfo.textContent  =
      `${saved.pageNum}ページ目・${saved.currentIdx + 1} / ${saved.totalParagraphs} 段落`;
    resumeBanner.style.display = 'block';
  });

  resumeYes.addEventListener('click', () => {
    resumeBanner.style.display = 'none';
    fileInput.click(); // ユーザーに同じPDFを選んでもらう（resumeフラグを立てる）
    pendingResume = true;
  });

  resumeNo.addEventListener('click', () => {
    clearProgress();
    resumeBanner.style.display = 'none';
  });

  let pendingResume = false;

  /* ===================== FILE UPLOAD ===================== */
  uploadCard.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) loadPDF(e.target.files[0]);
  });
  uploadCard.addEventListener('dragover', e => {
    e.preventDefault(); uploadCard.classList.add('drag-over');
  });
  uploadCard.addEventListener('dragleave', () => uploadCard.classList.remove('drag-over'));
  uploadCard.addEventListener('drop', e => {
    e.preventDefault(); uploadCard.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.name.endsWith('.pdf')) loadPDF(f);
  });
  newFileBtn.addEventListener('click', () => {
    stopAll();
    playerScreen.style.display = 'none';
    uploadScreen.style.display = 'flex';
    fileInput.value = '';
    paragraphs = [];
    const saved = getSavedProgress();
    if (saved) {
      resumeTitle.textContent = `📂 前回: ${saved.filename}`;
      resumeInfo.textContent  =
        `${saved.pageNum}ページ目・${saved.currentIdx + 1} / ${saved.totalParagraphs} 段落`;
      resumeBanner.style.display = 'block';
    }
  });

  /* ===================== LOAD PDF ===================== */
  async function loadPDF(file) {
    showLoading('PDFを読み込み中...');
    try {
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      totalPages = pdf.numPages;

      paragraphs = [];
      for (let p = 1; p <= totalPages; p++) {
        loadingText.textContent = `テキストを抽出中... ${p} / ${totalPages} ページ`;
        const page    = await pdf.getPage(p);
        const content = await page.getTextContent();
        paragraphs.push(...chunk(buildText(content), p));
      }
      paragraphs = paragraphs.filter(p => p.text.trim().length > 3);

      if (paragraphs.length === 0) {
        hideLoading();
        showToast('テキストを抽出できませんでした（画像PDFの可能性があります）');
        return;
      }

      // 続きから再生の復元
      currentIdx = 0;
      if (pendingResume) {
        pendingResume = false;
        const saved = getSavedProgress();
        if (saved && saved.filename === file.name && saved.currentIdx < paragraphs.length) {
          currentIdx = saved.currentIdx;
          showToast(`${saved.pageNum}ページ目から再開します`);
        }
      }

      filenameEl.textContent = file.name;
      resumeBanner.style.display = 'none';
      hideLoading();
      uploadScreen.style.display = 'none';
      playerScreen.style.display = 'flex';
      playerScreen.style.flexDirection = 'column';

      renderList(); updateProgress(); updatePageInfo();
      showToast(`${paragraphs.length} 段落を読み込みました`);
    } catch (err) {
      hideLoading();
      showToast('読み込みエラー: ' + err.message);
    }
  }

  function buildText(content) {
    const items = content.items.filter(it => it.str.trim());
    if (!items.length) return '';
    const sorted = [...items].sort((a, b) => {
      const dy = b.transform[5] - a.transform[5];
      return Math.abs(dy) > 3 ? dy : a.transform[4] - b.transform[4];
    });
    let out = '', lastY = sorted[0].transform[5];
    for (const it of sorted) {
      if (Math.abs(it.transform[5] - lastY) > 8) out += '\n';
      out += it.str;
      lastY = it.transform[5];
    }
    return out;
  }

  function chunk(text, pageNum, maxLen = 130) {
    const parts = text
      .split(/\n+/)
      .flatMap(line => line.split(/(?<=[。！？])\s*/))
      .map(s => s.trim()).filter(s => s.length > 0);
    const result = [];
    let cur = '';
    for (const s of parts) {
      if (cur.length + s.length > maxLen && cur.length > 0) {
        result.push({ text: cur, pageNum }); cur = s;
      } else { cur += s; }
    }
    if (cur.trim()) result.push({ text: cur.trim(), pageNum });
    return result;
  }

  /* ===================== RENDER ===================== */
  function renderList() {
    textDisplay.innerHTML = '';
    const from = Math.max(0, currentIdx - 4);
    const to   = Math.min(paragraphs.length - 1, currentIdx + 14);
    for (let i = from; i <= to; i++) {
      const div = document.createElement('div');
      div.className   = 'para-item' + (i === currentIdx ? ' active' : '') + (i < currentIdx ? ' done' : '');
      div.textContent = paragraphs[i].text;
      div.addEventListener('click', () => jumpTo(i));
      textDisplay.appendChild(div);
    }
    textDisplay.querySelector('.active')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function updateProgress() {
    const pct = paragraphs.length ? ((currentIdx + 1) / paragraphs.length * 100) : 0;
    progressFill.style.width  = pct.toFixed(1) + '%';
    progressLabel.textContent = `${currentIdx + 1} / ${paragraphs.length} 段落`;
  }

  function updatePageInfo() {
    if (!paragraphs.length) return;
    pageInfo.textContent = `${paragraphs[currentIdx].pageNum} / ${totalPages} ページ`;
  }

  /* ===================== VOICE SELECT ===================== */
  // VOICEVOX → Web Speech に切り替わった時、ドロップダウンを実際の音声リストに更新
  function switchToWebSpeechVoices() {
    wsVoices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('ja'));
    if (wsVoices.length === 0) {
      // voices がまだ読み込まれていない場合は少し待つ
      speechSynthesis.onvoiceschanged = () => {
        wsVoices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('ja'));
        buildWebSpeechOptions();
      };
    } else {
      buildWebSpeechOptions();
    }
  }

  function buildWebSpeechOptions() {
    voiceSelect.innerHTML = '';
    wsVoices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value       = i;
      opt.textContent = v.name.replace('Google ', '').replace('Microsoft ', '');
      voiceSelect.appendChild(opt);
    });
    wsVoiceIdx = 0;
  }

  voiceSelect.addEventListener('change', () => {
    if (ttsMode === 'voicevox') {
      speakerId = parseInt(voiceSelect.value);
      prefetch  = null;
    } else {
      wsVoiceIdx = parseInt(voiceSelect.value);
    }
  });

  /* ===================== CONTROLS ===================== */
  playBtn.addEventListener('click', () => isPlaying ? pause() : play());

  prevBtn.addEventListener('click', () => {
    if (currentIdx > 0) { stopAll(); currentIdx--; renderList(); updateProgress(); updatePageInfo(); saveProgress(); if (isPlaying) speakCurrent(); }
  });
  nextBtn.addEventListener('click', () => {
    if (currentIdx < paragraphs.length - 1) { stopAll(); currentIdx++; renderList(); updateProgress(); updatePageInfo(); saveProgress(); if (isPlaying) speakCurrent(); }
  });

  prevPageBtn.addEventListener('click', () => {
    const curPage = paragraphs[currentIdx].pageNum;
    const prev = [...paragraphs].reverse().find(p => p.pageNum < curPage);
    if (!prev) return;
    const first = paragraphs.findIndex(p => p.pageNum === prev.pageNum);
    if (first >= 0) jumpTo(first);
  });
  nextPageBtn.addEventListener('click', () => {
    const idx = paragraphs.findIndex(p => p.pageNum > paragraphs[currentIdx].pageNum);
    if (idx >= 0) jumpTo(idx);
  });

  function jumpTo(idx) {
    stopAll(); currentIdx = idx;
    renderList(); updateProgress(); updatePageInfo(); saveProgress();
  }

  speedSlider.addEventListener('input', () => {
    currentRate = speedSlider.value / 10;
    speedVal.textContent    = currentRate.toFixed(1) + 'x';
    audioEl.playbackRate    = currentRate;
  });

  /* ===================== PLAYBACK ===================== */
  function play()  { isPlaying = true;  playBtn.textContent = '⏸'; speakCurrent(); }
  function pause() {
    isPlaying = false; playBtn.textContent = '▶';
    if (ttsMode === 'voicevox') audioEl.pause();
    else speechSynthesis.pause();
  }

  function stopAll() {
    audioEl.pause(); audioEl.src = '';
    speechSynthesis.cancel();
    if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }
    prefetch = null;
  }

  async function speakCurrent() {
    if (!isPlaying || currentIdx >= paragraphs.length) {
      if (currentIdx >= paragraphs.length) {
        isPlaying = false; playBtn.textContent = '▶';
        showToast('読み上げが完了しました ✓');
        clearProgress();
      }
      return;
    }
    const para = paragraphs[currentIdx];
    renderList(); updateProgress(); updatePageInfo();
    updateMediaSession(para.text);
    saveProgress();

    ttsMode === 'voicevox' ? await speakVoicevox(para.text) : speakWebSpeech(para.text);
  }

  /* --- VOICEVOX --- */
  // 複数エンドポイントを順番に試す
  const VOICEVOX_URLS = [
    (text, id) => `https://api.tts.quest/v3/voicevox/synthesis?text=${encodeURIComponent(text)}&speaker=${id}`,
    (text, id) => `https://deprecatedapis.tts.quest/v2/voicevox/audio/?speaker=${id}&text=${encodeURIComponent(text)}`,
  ];

  async function fetchVoicevox(text) {
    for (const urlFn of VOICEVOX_URLS) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 10000);
      try {
        const res = await fetch(urlFn(text, speakerId), { signal: controller.signal });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const blob = await res.blob();
        clearTimeout(timer);
        return blob;
      } catch (e) {
        clearTimeout(timer);
        // 次のエンドポイントを試す
      }
    }
    throw new Error('全VOICEVOXエンドポイント失敗');
  }

  async function speakVoicevox(text) {
    try {
      let blob;
      if (prefetch && prefetch.index === currentIdx) {
        blob = prefetch.blob; prefetch = null;
      } else {
        blob = await fetchVoicevox(text);
      }
      if (!isPlaying) return;

      if (blobUrl) URL.revokeObjectURL(blobUrl);
      blobUrl = URL.createObjectURL(blob);
      audioEl.src = blobUrl;
      audioEl.playbackRate = currentRate;
      audioEl.onended = () => { if (isPlaying) { currentIdx++; speakCurrent(); } };
      audioEl.onerror = () => { if (isPlaying) { currentIdx++; speakCurrent(); } };
      await audioEl.play();

      // 先読み
      const ni = currentIdx + 1;
      if (ni < paragraphs.length) {
        fetchVoicevox(paragraphs[ni].text)
          .then(b => { prefetch = { index: ni, blob: b }; })
          .catch(() => {});
      }
    } catch (err) {
      console.warn('VOICEVOX失敗:', err);
      ttsMode = 'webspeech';
      ttsBadge.className   = 'tts-badge fallback';
      ttsBadge.textContent = '🔈 ブラウザ内蔵音声（バックグラウンド再生不可）';
      showToast('VOICEVOX接続失敗。ブラウザ音声に切り替えました');
      switchToWebSpeechVoices();
      speakWebSpeech(paragraphs[currentIdx].text);
    }
  }

  /* --- Web Speech API --- */
  function speakWebSpeech(text) {
    speechSynthesis.cancel();
    const utt  = new SpeechSynthesisUtterance(text);
    utt.lang   = 'ja-JP';
    utt.rate   = currentRate;
    if (wsVoices.length > 0) utt.voice = wsVoices[wsVoiceIdx] || wsVoices[0];
    utt.onend  = () => { if (isPlaying) { currentIdx++; speakCurrent(); } };
    utt.onerror = () => { if (isPlaying) { currentIdx++; speakCurrent(); } };
    speechSynthesis.speak(utt);
  }

  /* ===================== MEDIA SESSION ===================== */
  function updateMediaSession(text) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: 'PDF音読中', artist: text.substring(0, 60), album: filenameEl.textContent,
    });
    navigator.mediaSession.setActionHandler('play',  play);
    navigator.mediaSession.setActionHandler('pause', pause);
    navigator.mediaSession.setActionHandler('previoustrack', () => {
      if (currentIdx > 0) { stopAll(); currentIdx--; renderList(); updateProgress(); updatePageInfo(); saveProgress(); if (isPlaying) speakCurrent(); }
    });
    navigator.mediaSession.setActionHandler('nexttrack', () => {
      if (currentIdx < paragraphs.length - 1) { stopAll(); currentIdx++; renderList(); updateProgress(); updatePageInfo(); saveProgress(); if (isPlaying) speakCurrent(); }
    });
  }

  /* ===================== WAKE LOCK ===================== */
  let wakeLock = null;
  async function requestWakeLock() {
    if ('wakeLock' in navigator) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch (_) {}
    }
  }
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && isPlaying) await requestWakeLock();
  });
  playBtn.addEventListener('click', () => { if (!isPlaying) requestWakeLock(); });

  /* ===================== UTILS ===================== */
  function showLoading(msg) { loadingText.textContent = msg; loadingOverlay.classList.add('show'); }
  function hideLoading()    { loadingOverlay.classList.remove('show'); }

  let toastTimer;
  function showToast(msg) {
    toastEl.textContent = msg; toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3200);
  }
</script>
</body>
</html>
