<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PDF音読アプリ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PDF音読">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --accent: #7c6fff;
      --accent2: #a89eff;
      --text: #e8e8f0;
      --text-dim: #9090aa;
      --text-active: #ffffff;
      --bar-h: 64px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif; }

    /* ===== UPLOAD ===== */
    #upload-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 20px; padding: 24px;
    }
    .upload-card {
      width: 100%; max-width: 400px;
      border: 2px dashed var(--accent); border-radius: 24px;
      padding: 60px 24px; text-align: center; cursor: pointer;
      transition: background 0.2s; user-select: none;
    }
    .upload-card:active { background: rgba(124,111,255,0.1); }
    .upload-card .icon  { font-size: 64px; margin-bottom: 16px; }
    .upload-card .label { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .upload-card .sub   { font-size: 14px; color: var(--text-dim); }
    #file-input { display: none; }

    #resume-banner {
      display: none; width: 100%; max-width: 400px;
      background: rgba(124,111,255,0.15); border: 1px solid var(--accent);
      border-radius: 16px; padding: 16px; text-align: center;
    }
    #resume-banner p     { font-size: 15px; margin-bottom: 8px; }
    #resume-banner small { font-size: 12px; color: var(--text-dim); display: block; margin-bottom: 12px; }
    .resume-btns { display: flex; gap: 10px; justify-content: center; }
    .btn-resume { padding: 10px 24px; border-radius: 20px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn-resume.primary   { background: var(--accent); color: #fff; }
    .btn-resume.secondary { background: #2a2a4a; color: var(--text-dim); }

    /* ===== READER ===== */
    #reader-screen { display: none; flex-direction: column; height: 100%; position: relative; }

    /* トップバー */
    #top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: opacity 0.3s, transform 0.3s;
      z-index: 10; flex-shrink: 0;
    }
    #top-bar.hidden { opacity: 0; transform: translateY(-100%); pointer-events: none; }
    .top-filename { font-size: 13px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }
    .btn-icon { background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; padding: 4px 8px; }

    /* テキストエリア（Kindleの本文） */
    #text-area {
      flex: 1; overflow-y: auto; padding: 20px 20px 8px;
      scroll-behavior: smooth; position: relative;
    }
    .para-item {
      font-size: 18px; line-height: 2.0;
      padding: 6px 0; color: var(--text-dim);
      transition: color 0.2s; cursor: pointer;
    }
    .para-item.active { color: var(--text-active); }
    .para-item.done   { color: #44445a; }

    /* 前後ボタン */
    .btn-skip {
      width: 48px; height: 48px; border-radius: 50%; border: none;
      background: rgba(124,111,255,0.15); color: var(--accent2);
      font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .btn-skip:active { background: rgba(124,111,255,0.35); }

    /* ボトムバー（常時表示） */
    #bottom-bar {
      flex-shrink: 0; background: var(--surface);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 0 16px 8px; padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    #progress-track {
      width: 100%; height: 3px; background: rgba(255,255,255,0.1);
      border-radius: 2px; margin-bottom: 10px; cursor: pointer;
    }
    #progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }
    #bottom-main { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
    #page-label { font-size: 13px; color: var(--text-dim); min-width: 54px; text-align: center; }
    #play-btn {
      width: 56px; height: 56px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(124,111,255,0.4);
      transition: transform 0.1s, background 0.15s;
    }
    #play-btn:active { transform: scale(0.92); }
    #speed-btn {
      font-size: 14px; font-weight: 700; color: var(--accent2);
      background: none; border: 1px solid rgba(124,111,255,0.3);
      border-radius: 8px; padding: 6px 12px; cursor: pointer; min-width: 60px; text-align: right;
    }

    /* 設定ドロワー（中央タップで表示） */
    #drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-radius: 20px 20px 0 0;
      padding: 12px 24px 32px; z-index: 50;
      transform: translateY(100%); transition: transform 0.3s ease;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.4);
    }
    #drawer.open { transform: translateY(0); }
    .drawer-handle { width: 40px; height: 4px; background: #444; border-radius: 2px; margin: 0 auto 20px; }
    .drawer-title  { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
    .drawer-row    { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }

    input[type="range"] {
      flex: 1; -webkit-appearance: none; height: 4px;
      background: #2a2a4a; border-radius: 2px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 24px; height: 24px;
      background: var(--accent); border-radius: 50%; cursor: pointer;
    }
    select.voice-select {
      flex: 1; background: #2a2a4a; border: 1px solid #444;
      border-radius: 10px; color: var(--text); padding: 10px 12px; font-size: 15px;
    }
    .speed-label { font-size: 18px; font-weight: 700; color: var(--accent2); min-width: 44px; text-align: right; }
    .btn-new-file {
      width: 100%; padding: 14px; background: #2a2a4a; border: none;
      border-radius: 12px; color: var(--text-dim); font-size: 15px; cursor: pointer;
      margin-top: 4px;
    }
    #drawer-overlay {
      display: none; position: fixed; inset: 0; z-index: 40; background: rgba(0,0,0,0.3);
    }
    #drawer-overlay.show { display: block; }

    /* kana status */
    #kana-status { font-size: 11px; color: var(--text-dim); text-align: center; padding: 4px 0 0; }

    /* ローディング */
    #loading-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(15,15,35,0.94); justify-content: center; align-items: center;
      flex-direction: column; gap: 16px; z-index: 300;
    }
    #loading-overlay.show { display: flex; }
    .spinner { width: 44px; height: 44px; border: 3px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { font-size: 15px; color: var(--text-dim); }

    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #2a2a4a; border: 1px solid #444; color: var(--text); padding: 10px 22px; border-radius: 24px; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 400; white-space: nowrap; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Upload -->
<div id="upload-screen">
  <div class="upload-card" id="upload-card">
    <div class="icon">📖</div>
    <div class="label">PDFを選択</div>
    <div class="sub">タップして端末から選ぶ</div>
  </div>
  <input type="file" id="file-input" accept=".pdf">
  <div id="resume-banner">
    <p id="resume-title"></p>
    <small id="resume-info"></small>
    <div class="resume-btns">
      <button class="btn-resume primary"   id="resume-yes">続きから再生</button>
      <button class="btn-resume secondary" id="resume-no">最初から</button>
    </div>
  </div>
</div>

<!-- Reader -->
<div id="reader-screen">
  <!-- トップバー -->
  <div id="top-bar">
    <span class="top-filename" id="filename"></span>
    <button class="btn-icon" id="settings-btn">⚙</button>
  </div>

  <!-- テキスト表示 -->
  <div style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
    <div id="text-area" onclick="handleCenterTap(event)"></div>
  </div>

  <!-- ボトムバー -->
  <div id="bottom-bar">
    <div id="kana-status"></div>
    <div id="progress-track" onclick="seekProgress(event)">
      <div id="progress-fill"></div>
    </div>
    <div id="bottom-main">
      <button class="btn-skip" id="prev-btn">⏮</button>
      <button id="play-btn">▶</button>
      <button class="btn-skip" id="next-btn">⏭</button>
      <span id="page-label">- / -</span>
      <button id="speed-btn" onclick="cycleSpeed()">1.0x</button>
    </div>
  </div>
</div>

<!-- 設定ドロワー -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">声</div>
  <div class="drawer-row">
    <select class="voice-select" id="voice-select">
      <option value="ja-JP-Neural2-B">Neural2 女性A（自然・高品質）</option>
      <option value="ja-JP-Neural2-C">Neural2 男性A</option>
      <option value="ja-JP-Neural2-D">Neural2 男性B</option>
      <option value="ja-JP-Wavenet-A">Wavenet 女性A</option>
      <option value="ja-JP-Wavenet-B">Wavenet 女性B</option>
      <option value="ja-JP-Wavenet-C">Wavenet 男性A</option>
      <option value="ja-JP-Wavenet-D">Wavenet 男性B</option>
    </select>
  </div>
  <div class="drawer-title">速度</div>
  <div class="drawer-row">
    <input type="range" id="speed-slider" min="5" max="25" value="10" step="1">
    <span class="speed-label" id="speed-val-drawer">1.0x</span>
  </div>
  <button class="btn-new-file" id="new-file-btn">📄 別のPDFを開く</button>
</div>

<div id="loading-overlay"><div class="spinner"></div><div id="loading-text">読み込み中...</div></div>
<div class="toast" id="toast"></div>
<audio id="audio-el" preload="auto"></audio>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  /* ===== STATE ===== */
  let paragraphs  = [];
  let currentIdx  = 0;
  let isPlaying   = false;
  let currentRate = 1.0;
  let totalPages  = 0;
  let ttsMode     = 'googletts';
  let blobUrl     = null;
  let wsVoices    = [];
  let wsVoiceIdx  = 0;
  let prefetch    = null;
  let uiVisible   = true;
  let uiTimer     = null;

  const SPEEDS = [0.7, 1.0, 1.2, 1.5, 1.8, 2.0];
  let speedIdx = 1;

  const GOOGLE_TTS_KEY = 'AIzaSyBBzRXePjxWPK_PMIgava_FTtLO7zlVBMo';
  let googleVoiceName  = 'ja-JP-Neural2-B';
  const LS_KEY         = 'pdf-reader-progress';

  /* ===== 読み補正辞書 ===== */
  const DICT = {
    '用語':'ようご','小さな':'ちいさな','用途':'ようと','訪問日':'ほうもんび',
    '購入':'こうにゅう','発生':'はっせい','費用':'ひよう','表示':'ひょうじ',
    '目標':'もくひょう','流入':'りゅうにゅう','自然':'しぜん','生成':'せいせい',
    '行動':'こうどう','文章':'ぶんしょう','文字列':'もじれつ','生まれ':'うまれ',
    '誰一人':'だれひとり','日本':'にほん','方向':'ほうこう','生かし':'いかし',
    '導入':'どうにゅう','力':'ちから','目的':'もくてき','一般':'いっぱん',
    '説明':'せつめい','言葉':'ことば','一貫':'いっかん','標準':'ひょうじゅん',
    '工夫':'くふう','初心者':'しょしんしゃ','最小限':'さいしょうげん',
    '用意':'ようい','目指し':'めざし',
  };
  const kanaStatusEl = document.getElementById('kana-status');

  function toKana(text) {
    let t = text.normalize('NFKC')
      .replace(/(\d+)月(\d+)日/g, (_, m, d) => `${m}がつ${d}にち`)
      .replace(/(\d+)年/g,  (_, y) => `${y}ねん`)
      .replace(/(\d+)月/g,  (_, m) => `${m}がつ`)
      .replace(/(\d+)日/g,  (_, d) => `${d}にち`)
      .replace(/(\d+)%/g,   (_, n) => `${n}パーセント`)
      .replace(/(\d+)円/g,  (_, n) => `${n}えん`);
    for (const [k, v] of Object.entries(DICT)) t = t.replaceAll(k, v);
    return Promise.resolve(t);
  }

  /* ===== DOM ===== */
  const uploadScreen   = document.getElementById('upload-screen');
  const readerScreen   = document.getElementById('reader-screen');
  const uploadCard     = document.getElementById('upload-card');
  const fileInput      = document.getElementById('file-input');
  const filenameEl     = document.getElementById('filename');
  const newFileBtn     = document.getElementById('new-file-btn');
  const progressFill   = document.getElementById('progress-fill');
  const pageLabel      = document.getElementById('page-label');
  const textArea       = document.getElementById('text-area');
  const playBtn        = document.getElementById('play-btn');
  const speedBtn       = document.getElementById('speed-btn');
  const voiceSelect    = document.getElementById('voice-select');
  const loadingOverlay = document.getElementById('loading-overlay');
  const loadingText    = document.getElementById('loading-text');
  const toastEl        = document.getElementById('toast');
  const audioEl        = document.getElementById('audio-el');
  const resumeBanner   = document.getElementById('resume-banner');
  const resumeTitle    = document.getElementById('resume-title');
  const resumeInfo     = document.getElementById('resume-info');
  const resumeYes      = document.getElementById('resume-yes');
  const resumeNo       = document.getElementById('resume-no');
  const topBar         = document.getElementById('top-bar');
  const drawer         = document.getElementById('drawer');
  const drawerOverlay  = document.getElementById('drawer-overlay');
  const speedValDrawer = document.getElementById('speed-val-drawer');
  const speedSlider    = document.getElementById('speed-slider');

  /* ===== PROGRESS ===== */
  function saveProgress() {
    if (!paragraphs.length) return;
    localStorage.setItem(LS_KEY, JSON.stringify({
      filename: filenameEl.textContent, currentIdx,
      totalParagraphs: paragraphs.length,
      pageNum: paragraphs[currentIdx].pageNum, savedAt: Date.now(),
    }));
  }
  function getSaved() { try { return JSON.parse(localStorage.getItem(LS_KEY)); } catch { return null; } }
  function clearProgress() { localStorage.removeItem(LS_KEY); }

  /* ===== RESUME ===== */
  window.addEventListener('load', () => {
    const s = getSaved();
    if (!s) return;
    if ((Date.now() - s.savedAt) / 86400000 > 30) { clearProgress(); return; }
    resumeTitle.textContent = `📂 前回: ${s.filename}`;
    resumeInfo.textContent  = `${s.pageNum}ページ目・${s.currentIdx + 1} / ${s.totalParagraphs} 段落`;
    resumeBanner.style.display = 'block';
  });
  let pendingResume = false;
  resumeYes.addEventListener('click', () => { resumeBanner.style.display = 'none'; fileInput.click(); pendingResume = true; });
  resumeNo.addEventListener('click',  () => { clearProgress(); resumeBanner.style.display = 'none'; });

  /* ===== FILE UPLOAD ===== */
  uploadCard.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { if (e.target.files[0]) loadPDF(e.target.files[0]); });
  uploadCard.addEventListener('dragover',  e => { e.preventDefault(); });
  uploadCard.addEventListener('drop', e => {
    e.preventDefault();
    const f = e.dataTransfer.files[0];
    if (f?.name.endsWith('.pdf')) loadPDF(f);
  });
  newFileBtn.addEventListener('click', () => {
    closeDrawer(); stopAll();
    readerScreen.style.display = 'none';
    uploadScreen.style.display = 'flex';
    fileInput.value = ''; paragraphs = [];
    const s = getSaved();
    if (s) {
      resumeTitle.textContent = `📂 前回: ${s.filename}`;
      resumeInfo.textContent  = `${s.pageNum}ページ目・${s.currentIdx + 1} / ${s.totalParagraphs} 段落`;
      resumeBanner.style.display = 'block';
    }
  });

  /* ===== LOAD PDF ===== */
  async function loadPDF(file) {
    showLoading('PDFを読み込み中...');
    try {
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      totalPages = pdf.numPages;
      paragraphs = [];
      for (let p = 1; p <= totalPages; p++) {
        loadingText.textContent = `テキストを抽出中... ${p} / ${totalPages}`;
        const page    = await pdf.getPage(p);
        const content = await page.getTextContent();
        paragraphs.push(...chunk(buildText(content), p));
      }
      paragraphs = paragraphs.filter(p => p.text.trim().length > 3);
      if (!paragraphs.length) { hideLoading(); showToast('テキストを抽出できませんでした'); return; }

      currentIdx = 0;
      if (pendingResume) {
        pendingResume = false;
        const s = getSaved();
        if (s && s.filename === file.name && s.currentIdx < paragraphs.length) {
          currentIdx = s.currentIdx;
          showToast(`${s.pageNum}ページ目から再開します`);
        }
      }
      filenameEl.textContent = file.name;
      hideLoading();
      uploadScreen.style.display = 'none';
      readerScreen.style.display = 'flex';
      readerScreen.style.flexDirection = 'column';
      renderList(); updateProgress();
      showToast(`${totalPages}ページ・${paragraphs.length}段落を読み込みました`);
    } catch (err) {
      hideLoading(); showToast('読み込みエラー: ' + err.message);
    }
  }

  function buildText(content) {
    const items = content.items.filter(it => it.str.trim());
    if (!items.length) return '';
    const sorted = [...items].sort((a, b) => {
      const dy = b.transform[5] - a.transform[5];
      return Math.abs(dy) > 3 ? dy : a.transform[4] - b.transform[4];
    });
    let out = '', lastY = sorted[0].transform[5];
    for (const it of sorted) {
      if (Math.abs(it.transform[5] - lastY) > 8) out += '\n';
      out += it.str; lastY = it.transform[5];
    }
    return out;
  }

  function chunk(text, pageNum, maxLen = 130) {
    const parts = text.split(/\n+/)
      .flatMap(l => l.split(/(?<=[。！？])\s*/))
      .map(s => s.trim()).filter(s => s.length > 0);
    const result = []; let cur = '';
    for (const s of parts) {
      if (cur.length + s.length > maxLen && cur.length > 0) { result.push({ text: cur, pageNum }); cur = s; }
      else cur += s;
    }
    if (cur.trim()) result.push({ text: cur.trim(), pageNum });
    return result;
  }

  /* ===== RENDER ===== */
  function renderList() {
    textArea.innerHTML = '';
    const from = Math.max(0, currentIdx - 3);
    const to   = Math.min(paragraphs.length - 1, currentIdx + 20);
    for (let i = from; i <= to; i++) {
      const div = document.createElement('div');
      div.className   = 'para-item' + (i === currentIdx ? ' active' : '') + (i < currentIdx ? ' done' : '');
      div.textContent = paragraphs[i].text;
      div.dataset.idx = i;
      textArea.appendChild(div);
    }
    textArea.querySelector('.active')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function updateProgress() {
    if (!paragraphs.length) return;
    const pct = (currentIdx + 1) / paragraphs.length * 100;
    progressFill.style.width = pct.toFixed(1) + '%';
    pageLabel.textContent = `${paragraphs[currentIdx].pageNum} / ${totalPages}`;
    updateMediaSession(paragraphs[currentIdx].text);
  }

  /* ===== UI VISIBILITY ===== */
  function showUI() {
    topBar.classList.remove('hidden');
    uiVisible = true;
    clearTimeout(uiTimer);
    if (isPlaying) uiTimer = setTimeout(hideUI, 4000);
  }
  function hideUI() { topBar.classList.add('hidden'); uiVisible = false; }

  function handleCenterTap(e) {
    const el = e.target.closest('.para-item');
    if (el) { jumpTo(parseInt(el.dataset.idx)); return; }
    if (drawer.classList.contains('open')) { closeDrawer(); return; }
    uiVisible ? hideUI() : showUI();
  }

  function tapLeft() {
    if (drawer.classList.contains('open')) { closeDrawer(); return; }
    if (currentIdx > 0) { stopAll(); currentIdx--; renderList(); updateProgress(); saveProgress(); if (isPlaying) speakCurrent(); }
    showUI();
  }
  function tapRight() {
    if (drawer.classList.contains('open')) { closeDrawer(); return; }
    if (currentIdx < paragraphs.length - 1) { stopAll(); currentIdx++; renderList(); updateProgress(); saveProgress(); if (isPlaying) speakCurrent(); }
    showUI();
  }

  function openDrawer()  { drawer.classList.add('open'); drawerOverlay.classList.add('show'); showUI(); }
  function closeDrawer() { drawer.classList.remove('open'); drawerOverlay.classList.remove('show'); }

  document.getElementById('settings-btn').addEventListener('click', openDrawer);

  /* ===== SPEED ===== */
  function cycleSpeed() {
    speedIdx = (speedIdx + 1) % SPEEDS.length;
    currentRate = SPEEDS[speedIdx];
    const label = currentRate.toFixed(1) + 'x';
    speedBtn.textContent = label;
    speedValDrawer.textContent = label;
    speedSlider.value = Math.round(currentRate * 10);
    audioEl.playbackRate = currentRate;
  }
  speedSlider.addEventListener('input', () => {
    currentRate = speedSlider.value / 10;
    const label = currentRate.toFixed(1) + 'x';
    speedBtn.textContent = label;
    speedValDrawer.textContent = label;
    audioEl.playbackRate = currentRate;
  });

  /* ===== PROGRESS SEEK ===== */
  function seekProgress(e) {
    if (!paragraphs.length) return;
    const pct = e.offsetX / e.currentTarget.offsetWidth;
    const idx = Math.floor(pct * paragraphs.length);
    jumpTo(Math.max(0, Math.min(idx, paragraphs.length - 1)));
  }

  /* ===== VOICE ===== */
  voiceSelect.addEventListener('change', () => {
    if (ttsMode === 'googletts') { googleVoiceName = voiceSelect.value; prefetch = null; }
    else wsVoiceIdx = parseInt(voiceSelect.value);
  });

  /* ===== CONTROLS ===== */
  playBtn.addEventListener('click', () => { isPlaying ? pause() : play(); showUI(); });
  document.getElementById('prev-btn').addEventListener('click', () => tapLeft());
  document.getElementById('next-btn').addEventListener('click', () => tapRight());

  function jumpTo(idx) {
    stopAll(); currentIdx = idx;
    renderList(); updateProgress(); saveProgress();
    if (isPlaying) speakCurrent();
  }

  /* ===== PLAYBACK ===== */
  function play()  { isPlaying = true;  playBtn.textContent = '⏸'; speakCurrent(); uiTimer = setTimeout(hideUI, 4000); }
  function pause() { isPlaying = false; playBtn.textContent = '▶'; audioEl.pause(); if (ttsMode === 'webspeech') speechSynthesis.pause(); clearTimeout(uiTimer); showUI(); }
  function stopAll() {
    audioEl.pause(); audioEl.src = '';
    speechSynthesis.cancel();
    if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }
    prefetch = null;
  }

  async function speakCurrent() {
    if (!isPlaying || currentIdx >= paragraphs.length) {
      if (currentIdx >= paragraphs.length) {
        isPlaying = false; playBtn.textContent = '▶';
        showToast('読み上げが完了しました ✓'); clearProgress(); showUI();
      }
      return;
    }
    renderList(); updateProgress(); saveProgress();
    if (ttsMode === 'googletts') await speakGoogleTTS(paragraphs[currentIdx].text);
    else speakWebSpeech(paragraphs[currentIdx].text);
  }

  /* ===== GOOGLE TTS ===== */
  async function fetchGoogleTTS(text) {
    const kana = await toKana(text);
    const res = await fetch(
      `https://texttospeech.googleapis.com/v1/text:synthesize?key=${GOOGLE_TTS_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          input: { text: kana },
          voice: { languageCode: 'ja-JP', name: googleVoiceName },
          audioConfig: { audioEncoding: 'MP3', speakingRate: currentRate }
        })
      }
    );
    if (!res.ok) { const e = await res.text().catch(() => ''); throw new Error(`TTS ${res.status}: ${e}`); }
    const data = await res.json();
    if (!data.audioContent) throw new Error('audioContent empty');
    const bin = atob(data.audioContent);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return new Blob([buf], { type: 'audio/mpeg' });
  }

  async function speakGoogleTTS(text) {
    try {
      let blob;
      if (prefetch?.index === currentIdx) { blob = prefetch.blob; prefetch = null; }
      else blob = await fetchGoogleTTS(text);
      if (!isPlaying) return;
      if (blobUrl) URL.revokeObjectURL(blobUrl);
      blobUrl = URL.createObjectURL(blob);
      audioEl.src = blobUrl; audioEl.playbackRate = 1.0;
      audioEl.onended = () => { if (isPlaying) { currentIdx++; speakCurrent(); } };
      audioEl.onerror = () => { if (isPlaying) { currentIdx++; speakCurrent(); } };
      await audioEl.play();
      const ni = currentIdx + 1;
      if (ni < paragraphs.length) {
        fetchGoogleTTS(paragraphs[ni].text).then(b => { prefetch = { index: ni, blob: b }; }).catch(() => {});
      }
    } catch (err) {
      console.warn('Google TTS失敗:', err);
      ttsMode = 'webspeech'; showToast('Google TTS失敗。ブラウザ音声に切り替えました');
      switchToWSVoices(); speakWebSpeech(paragraphs[currentIdx].text);
    }
  }

  function speakWebSpeech(text) {
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'ja-JP'; utt.rate = currentRate;
    if (wsVoices.length) utt.voice = wsVoices[wsVoiceIdx] || wsVoices[0];
    utt.onend   = () => { if (isPlaying) { currentIdx++; speakCurrent(); } };
    utt.onerror = () => { if (isPlaying) { currentIdx++; speakCurrent(); } };
    speechSynthesis.speak(utt);
  }
  function switchToWSVoices() {
    wsVoices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('ja'));
    if (!wsVoices.length) speechSynthesis.onvoiceschanged = () => {
      wsVoices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('ja'));
    };
  }

  /* ===== MEDIA SESSION ===== */
  function updateMediaSession(text) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({ title: 'PDF音読中', artist: text.substring(0, 60), album: filenameEl.textContent });
    navigator.mediaSession.setActionHandler('play',  play);
    navigator.mediaSession.setActionHandler('pause', pause);
    navigator.mediaSession.setActionHandler('previoustrack', () => tapLeft());
    navigator.mediaSession.setActionHandler('nexttrack',     () => tapRight());
  }

  /* ===== WAKE LOCK ===== */
  let wakeLock = null;
  async function reqWakeLock() { if ('wakeLock' in navigator) try { wakeLock = await navigator.wakeLock.request('screen'); } catch {} }
  document.addEventListener('visibilitychange', async () => { if (document.visibilityState === 'visible' && isPlaying) await reqWakeLock(); });
  playBtn.addEventListener('click', () => { if (!isPlaying) reqWakeLock(); });

  /* ===== UTILS ===== */
  function showLoading(msg) { loadingText.textContent = msg; loadingOverlay.classList.add('show'); }
  function hideLoading()    { loadingOverlay.classList.remove('show'); }
  let toastTimer;
  function showToast(msg) {
    toastEl.textContent = msg; toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
