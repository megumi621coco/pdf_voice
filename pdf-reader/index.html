<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PDF音読アプリ</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg: #0f0f23;
      --surface: #1c1c3a;
      --accent: #7c6fff;
      --accent-light: #a89eff;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --highlight-bg: rgba(124, 111, 255, 0.18);
      --highlight-border: #7c6fff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; max-width: 560px; margin: 0 auto; padding: 16px 16px 32px;
    }
    header { text-align: center; padding: 12px 0 20px; }
    header h1 { font-size: 20px; color: var(--accent-light); letter-spacing: 0.03em; }
    header p  { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    #upload-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 72vh; gap: 16px;
    }
    .upload-card {
      width: 100%; border: 2px dashed var(--accent); border-radius: 20px;
      padding: 52px 24px; text-align: center; cursor: pointer;
      transition: background 0.2s, border-color 0.2s; user-select: none;
    }
    .upload-card:hover, .upload-card.drag-over { background: rgba(124,111,255,0.08); border-color: var(--accent-light); }
    .upload-card .icon  { font-size: 56px; margin-bottom: 16px; }
    .upload-card .label { font-size: 18px; margin-bottom: 8px; }
    .upload-card .sub   { font-size: 13px; color: var(--text-muted); }
    #file-input { display: none; }

    #resume-banner {
      display: none; width: 100%;
      background: rgba(124,111,255,0.15); border: 1px solid var(--accent);
      border-radius: 14px; padding: 14px 16px; text-align: center;
    }
    #resume-banner p     { font-size: 14px; margin-bottom: 10px; color: var(--text); }
    #resume-banner small { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 10px; }
    .resume-btns { display: flex; gap: 8px; justify-content: center; }
    .btn-resume { padding: 8px 20px; border-radius: 20px; border: none; cursor: pointer; font-size: 14px; }
    .btn-resume.primary   { background: var(--accent); color: white; }
    .btn-resume.secondary { background: #2a2a4a; color: var(--text-muted); border: 1px solid #444; }

    #player-screen { display: none; flex-direction: column; gap: 14px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; }
    .filename { font-size: 13px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }
    .btn-text { background: none; border: 1px solid #444; border-radius: 8px; color: var(--text-muted); padding: 5px 12px; font-size: 13px; cursor: pointer; }

    .tts-badge { text-align: center; font-size: 11px; padding: 3px 10px; border-radius: 12px; display: inline-block; }
    .tts-badge.googletts { background: rgba(66,133,244,0.2); color: #7ab4ff; }
    .tts-badge.fallback  { background: rgba(255,180,0,0.15); color: #ffcc44; }
    .tts-badge-row { text-align: center; }
    .kana-status { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: -8px; }

    .progress-bar { width: 100%; height: 5px; background: #2a2a4a; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 3px; transition: width 0.4s; }
    .progress-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-align: right; }

    .text-display { background: var(--surface); border-radius: 16px; padding: 16px; height: 38vh; overflow-y: auto; scroll-behavior: smooth; }
    .para-item {
      padding: 9px 12px; border-radius: 10px; margin-bottom: 6px;
      cursor: pointer; color: var(--text-muted); font-size: 15px;
      line-height: 1.75; transition: background 0.15s, color 0.15s;
      border-left: 3px solid transparent;
    }
    .para-item:hover { background: rgba(255,255,255,0.04); }
    .para-item.active { background: var(--highlight-bg); border-left-color: var(--highlight-border); color: var(--text); }
    .para-item.done { color: #555577; }

    .controls-card { background: var(--surface); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 18px; }
    .main-controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
    .btn-circle { border: none; background: none; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; border-radius: 50%; flex-shrink: 0; transition: transform 0.1s, background 0.15s; }
    .btn-circle:active { transform: scale(0.88); }
    .btn-sm   { width: 48px; height: 48px; font-size: 22px; }
    .btn-play { width: 72px; height: 72px; font-size: 30px; background: var(--accent); }
    .btn-play:hover { background: var(--accent-light); }
    .btn-skip { background: rgba(124,111,255,0.12); }
    .btn-skip:hover { background: rgba(124,111,255,0.25); }

    .speed-row { display: flex; align-items: center; gap: 12px; }
    .speed-row label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
    .speed-val { font-size: 16px; font-weight: bold; color: var(--accent-light); min-width: 38px; text-align: right; }
    input[type="range"] { flex: 1; -webkit-appearance: none; height: 4px; background: #2a2a4a; border-radius: 2px; outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: var(--accent); border-radius: 50%; cursor: pointer; box-shadow: 0 0 0 3px rgba(124,111,255,0.2); }

    .voice-row { display: flex; align-items: center; gap: 10px; }
    .voice-row label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
    select.voice-select { flex: 1; background: #2a2a4a; border: 1px solid #444; border-radius: 8px; color: var(--text); padding: 8px 10px; font-size: 14px; }

    .page-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
    .btn-page { background: #2a2a4a; border: 1px solid #444; border-radius: 10px; color: var(--text); padding: 10px 18px; font-size: 14px; cursor: pointer; }
    .btn-page:active { background: rgba(124,111,255,0.25); }
    .page-info { font-size: 14px; color: var(--text-muted); min-width: 80px; text-align: center; }

    #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(15,15,35,0.92); justify-content: center; align-items: center; flex-direction: column; gap: 16px; z-index: 300; }
    #loading-overlay.show { display: flex; }
    .spinner { width: 42px; height: 42px; border: 3px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { font-size: 15px; color: var(--text-muted); }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #2a2a4a; border: 1px solid #444; color: var(--text); padding: 10px 22px; border-radius: 24px; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 400; white-space: nowrap; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>📖 PDF音読アプリ</h1>
  <p>PDFを読み込んで、耳で学習しよう</p>
</header>

<div id="upload-screen">
  <div class="upload-card" id="upload-card">
    <div class="icon">📄</div>
    <div class="label">PDFをタップして選択</div>
    <div class="sub">またはここにドラッグ＆ドロップ</div>
  </div>
  <input type="file" id="file-input" accept=".pdf">
  <div id="resume-banner">
    <p id="resume-title"></p>
    <small id="resume-info"></small>
    <div class="resume-btns">
      <button class="btn-resume primary"   id="resume-yes">続きから再生</button>
      <button class="btn-resume secondary" id="resume-no">最初から</button>
    </div>
  </div>
</div>

<div id="player-screen">
  <div class="top-bar">
    <span class="filename" id="filename"></span>
    <button class="btn-text" id="new-file-btn">別のPDF</button>
  </div>
  <div class="tts-badge-row">
    <span class="tts-badge googletts" id="tts-badge">🎙 Google高品質音声</span>
  </div>
  <div class="kana-status" id="kana-status">漢字変換: 準備中...</div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">0 / 0 段落</div>
  </div>
  <div class="text-display" id="text-display"></div>
  <div class="controls-card">
    <div class="main-controls">
      <button class="btn-circle btn-sm btn-skip" id="prev-btn">⏮</button>
      <button class="btn-circle btn-play" id="play-btn">▶</button>
      <button class="btn-circle btn-sm btn-skip" id="next-btn">⏭</button>
    </div>
    <div class="speed-row">
      <label>速度</label>
      <input type="range" id="speed-slider" min="5" max="25" value="10" step="1">
      <span class="speed-val" id="speed-val">1.0x</span>
    </div>
    <div class="voice-row">
      <label>声</label>
      <select class="voice-select" id="voice-select">
        <option value="ja-JP-Neural2-B">Neural2 女性A（自然・高品質）</option>
        <option value="ja-JP-Neural2-C">Neural2 男性A（自然・高品質）</option>
        <option value="ja-JP-Neural2-D">Neural2 男性B（自然・高品質）</option>
        <option value="ja-JP-Wavenet-A">Wavenet 女性A</option>
        <option value="ja-JP-Wavenet-B">Wavenet 女性B</option>
        <option value="ja-JP-Wavenet-C">Wavenet 男性A</option>
        <option value="ja-JP-Wavenet-D">Wavenet 男性B</option>
      </select>
    </div>
    <div class="page-row">
      <button class="btn-page" id="prev-page-btn">◀ 前ページ</button>
      <span class="page-info" id="page-info">-</span>
      <button class="btn-page" id="next-page-btn">次ページ ▶</button>
    </div>
  </div>
</div>

<div id="loading-overlay"><div class="spinner"></div><div id="loading-text">読み込み中...</div></div>
<div class="toast" id="toast"></div>
<audio id="audio-el" preload="auto"></audio>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  /* ===================== STATE ===================== */
  let paragraphs  = [];
  let currentIdx  = 0;
  let isPlaying   = false;
  let currentRate = 1.0;
  let totalPages  = 0;
  let ttsMode     = 'googletts';
  let blobUrl     = null;
  let wsVoices    = [];
  let wsVoiceIdx  = 0;
  let prefetch    = null;

  const GOOGLE_TTS_KEY = 'AIzaSyBBzRXePjxWPK_PMIgava_FTtLO7zlVBMo';
  let googleVoiceName  = 'ja-JP-Neural2-B';
  const MAX_CHARS      = 4800;
  const LS_KEY         = 'pdf-reader-progress';

  /* ===================== テキスト前処理 ===================== */
  const kanaStatusEl = document.getElementById('kana-status');
  kanaStatusEl.textContent = '🎙 Google Neural2（日本語漢字対応）';

  // 読み間違い補正辞書
  const DICT = {
    '用語':'ようご','小さな':'ちいさな','用途':'ようと','訪問日':'ほうもんび',
    '購入':'こうにゅう','発生':'はっせい','費用':'ひよう','表示':'ひょうじ',
    '目標':'もくひょう','流入':'りゅうにゅう','自然':'しぜん','生成':'せいせい',
    '行動':'こうどう','文章':'ぶんしょう','文字列':'もじれつ','生まれ':'うまれ',
    '誰一人':'だれひとり','日本':'にほん','方向':'ほうこう','生かし':'いかし',
    '導入':'どうにゅう','力':'ちから','目的':'もくてき','一般':'いっぱん',
    '説明':'せつめい','言葉':'ことば','一貫':'いっかん','標準':'ひょうじゅん',
    '工夫':'くふう','初心者':'しょしんしゃ','最小限':'さいしょうげん',
    '用意':'ようい','目指し':'めざし',
  };

  function toKana(text) {
    // NFKC正規化でCJK互換文字・全角文字を標準形に統一
    let t = text.normalize('NFKC')
      .replace(/(\d+)月(\d+)日/g, (_, m, d) => `${m}がつ${d}にち`)
      .replace(/(\d+)年/g, (_, y)  => `${y}ねん`)
      .replace(/(\d+)月/g, (_, m)  => `${m}がつ`)
      .replace(/(\d+)日/g, (_, d)  => `${d}にち`)
      .replace(/(\d+)%/g,  (_, n)  => `${n}パーセント`)
      .replace(/(\d+)円/g, (_, n)  => `${n}えん`);
    for (const [k, v] of Object.entries(DICT)) {
      t = t.replaceAll(k, v);
    }
    // デバッグ：「用」のコードポイントを表示
    const youIdx = text.indexOf('用');
    if (youIdx >= 0) {
      const cp = text.codePointAt(youIdx).toString(16).toUpperCase();
      kanaStatusEl.textContent = `「用」のコードポイント: U+${cp}（正常はU+7528）`;
    } else {
      kanaStatusEl.textContent = `変換後: ${t.substring(0, 30)}...`;
    }
    return Promise.resolve(t);
  }

  /* ===================== DOM ===================== */
  const uploadScreen   = document.getElementById('upload-screen');
  const playerScreen   = document.getElementById('player-screen');
  const uploadCard     = document.getElementById('upload-card');
  const fileInput      = document.getElementById('file-input');
  const filenameEl     = document.getElementById('filename');
  const newFileBtn     = document.getElementById('new-file-btn');
  const ttsBadge       = document.getElementById('tts-badge');
  const progressFill   = document.getElementById('progress-fill');
  const progressLabel  = document.getElementById('progress-label');
  const textDisplay    = document.getElementById('text-display');
  const playBtn        = document.getElementById('play-btn');
  const prevBtn        = document.getElementById('prev-btn');
  const nextBtn        = document.getElementById('next-btn');
  const prevPageBtn    = document.getElementById('prev-page-btn');
  const nextPageBtn    = document.getElementById('next-page-btn');
  const speedSlider    = document.getElementById('speed-slider');
  const speedVal       = document.getElementById('speed-val');
  const voiceSelect    = document.getElementById('voice-select');
  const pageInfo       = document.getElementById('page-info');
  const loadingOverlay = document.getElementById('loading-overlay');
  const loadingText    = document.getElementById('loading-text');
  const toastEl        = document.getElementById('toast');
  const audioEl        = document.getElementById('audio-el');
  const resumeBanner   = document.getElementById('resume-banner');
  const resumeTitle    = document.getElementById('resume-title');
  const resumeInfo     = document.getElementById('resume-info');
  const resumeYes      = document.getElementById('resume-yes');
  const resumeNo       = document.getElementById('resume-no');

  /* ===================== PROGRESS ===================== */
  function saveProgress() {
    if (!paragraphs.length) return;
    localStorage.setItem(LS_KEY, JSON.stringify({
      filename: filenameEl.textContent, currentIdx,
      totalParagraphs: paragraphs.length,
      pageNum: paragraphs[currentIdx].pageNum, savedAt: Date.now(),
    }));
  }
  function getSavedProgress() { try { return JSON.parse(localStorage.getItem(LS_KEY)); } catch { return null; } }
  function clearProgress() { localStorage.removeItem(LS_KEY); }

  /* ===================== RESUME ===================== */
  window.addEventListener('load', () => {
    const saved = getSavedProgress();
    if (!saved) return;
    if ((Date.now() - saved.savedAt) / 86400000 > 30) { clearProgress(); return; }
    resumeTitle.textContent = `📂 前回: ${saved.filename}`;
    resumeInfo.textContent  = `${saved.pageNum}ページ目・${saved.currentIdx + 1} / ${saved.totalParagraphs} 段落`;
    resumeBanner.style.display = 'block';
  });
  let pendingResume = false;
  resumeYes.addEventListener('click', () => { resumeBanner.style.display = 'none'; fileInput.click(); pendingResume = true; });
  resumeNo.addEventListener('click',  () => { clearProgress(); resumeBanner.style.display = 'none'; });

  /* ===================== FILE UPLOAD ===================== */
  uploadCard.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { if (e.target.files[0]) loadPDF(e.target.files[0]); });
  uploadCard.addEventListener('dragover',  e => { e.preventDefault(); uploadCard.classList.add('drag-over'); });
  uploadCard.addEventListener('dragleave', () => uploadCard.classList.remove('drag-over'));
  uploadCard.addEventListener('drop', e => {
    e.preventDefault(); uploadCard.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.name.endsWith('.pdf')) loadPDF(f);
  });
  newFileBtn.addEventListener('click', () => {
    stopAll();
    playerScreen.style.display = 'none';
    uploadScreen.style.display = 'flex';
    fileInput.value = ''; paragraphs = [];
    const saved = getSavedProgress();
    if (saved) {
      resumeTitle.textContent = `📂 前回: ${saved.filename}`;
      resumeInfo.textContent  = `${saved.pageNum}ページ目・${saved.currentIdx + 1} / ${saved.totalParagraphs} 段落`;
      resumeBanner.style.display = 'block';
    }
  });

  /* ===================== LOAD PDF ===================== */
  async function loadPDF(file) {
    showLoading('PDFを読み込み中...');
    try {
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      totalPages = pdf.numPages;
      paragraphs = [];
      for (let p = 1; p <= totalPages; p++) {
        loadingText.textContent = `テキストを抽出中... ${p} / ${totalPages} ページ`;
        const page    = await pdf.getPage(p);
        const content = await page.getTextContent();
        paragraphs.push(...chunk(buildText(content), p));
      }
      paragraphs = paragraphs.filter(p => p.text.trim().length > 3);

      if (!paragraphs.length) {
        hideLoading();
        showToast('テキストを抽出できませんでした（画像PDFの可能性があります）');
        return;
      }

      currentIdx = 0;
      if (pendingResume) {
        pendingResume = false;
        const saved = getSavedProgress();
        if (saved && saved.filename === file.name && saved.currentIdx < paragraphs.length) {
          currentIdx = saved.currentIdx;
          showToast(`${saved.pageNum}ページ目から再開します`);
        }
      }

      filenameEl.textContent = file.name;
      resumeBanner.style.display = 'none';
      hideLoading();
      uploadScreen.style.display = 'none';
      playerScreen.style.display = 'flex';
      playerScreen.style.flexDirection = 'column';
      renderList(); updateProgress(); updatePageInfo();
      showToast(`${totalPages} ページ・${paragraphs.length} 段落を読み込みました`);
    } catch (err) {
      hideLoading();
      showToast('読み込みエラー: ' + err.message);
    }
  }

  function buildText(content) {
    const items = content.items.filter(it => it.str.trim());
    if (!items.length) return '';
    const sorted = [...items].sort((a, b) => {
      const dy = b.transform[5] - a.transform[5];
      return Math.abs(dy) > 3 ? dy : a.transform[4] - b.transform[4];
    });
    let out = '', lastY = sorted[0].transform[5];
    for (const it of sorted) {
      if (Math.abs(it.transform[5] - lastY) > 8) out += '\n';
      out += it.str;
      lastY = it.transform[5];
    }
    return out;
  }

  function chunk(text, pageNum, maxLen = 130) {
    const parts = text.split(/\n+/)
      .flatMap(line => line.split(/(?<=[。！？])\s*/))
      .map(s => s.trim()).filter(s => s.length > 0);
    const result = [];
    let cur = '';
    for (const s of parts) {
      if (cur.length + s.length > maxLen && cur.length > 0) { result.push({ text: cur, pageNum }); cur = s; }
      else cur += s;
    }
    if (cur.trim()) result.push({ text: cur.trim(), pageNum });
    return result;
  }

  /* ===================== RENDER ===================== */
  function renderList() {
    textDisplay.innerHTML = '';
    const from = Math.max(0, currentIdx - 4);
    const to   = Math.min(paragraphs.length - 1, currentIdx + 14);
    for (let i = from; i <= to; i++) {
      const div = document.createElement('div');
      div.className   = 'para-item' + (i === currentIdx ? ' active' : '') + (i < currentIdx ? ' done' : '');
      div.textContent = paragraphs[i].text;
      div.addEventListener('click', () => jumpTo(i));
      textDisplay.appendChild(div);
    }
    textDisplay.querySelector('.active')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function updateProgress() {
    const pct = paragraphs.length ? ((currentIdx + 1) / paragraphs.length * 100) : 0;
    progressFill.style.width  = pct.toFixed(1) + '%';
    progressLabel.textContent = `${currentIdx + 1} / ${paragraphs.length} 段落`;
  }
  function updatePageInfo() {
    if (!paragraphs.length) return;
    pageInfo.textContent = `${paragraphs[currentIdx].pageNum} / ${totalPages} ページ`;
  }

  /* ===================== VOICE ===================== */
  voiceSelect.addEventListener('change', () => {
    if (ttsMode === 'googletts') { googleVoiceName = voiceSelect.value; prefetch = null; }
    else wsVoiceIdx = parseInt(voiceSelect.value);
  });
  function switchToWebSpeechVoices() {
    wsVoices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('ja'));
    if (!wsVoices.length) speechSynthesis.onvoiceschanged = () => {
      wsVoices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('ja')); buildWSOptions();
    };
    else buildWSOptions();
  }
  function buildWSOptions() {
    voiceSelect.innerHTML = '';
    wsVoices.forEach((v, i) => {
      const o = document.createElement('option');
      o.value = i; o.textContent = v.name.replace('Google ', '').replace('Microsoft ', '');
      voiceSelect.appendChild(o);
    });
    wsVoiceIdx = 0;
  }

  /* ===================== CONTROLS ===================== */
  playBtn.addEventListener('click', () => isPlaying ? pause() : play());
  prevBtn.addEventListener('click', () => {
    if (currentIdx > 0) { stopAll(); currentIdx--; renderList(); updateProgress(); updatePageInfo(); saveProgress(); if (isPlaying) speakCurrent(); }
  });
  nextBtn.addEventListener('click', () => {
    if (currentIdx < paragraphs.length - 1) { stopAll(); currentIdx++; renderList(); updateProgress(); updatePageInfo(); saveProgress(); if (isPlaying) speakCurrent(); }
  });

  // ページ単位で移動
  prevPageBtn.addEventListener('click', () => {
    const curPage = paragraphs[currentIdx].pageNum;
    const idx = [...paragraphs].reverse().findIndex(p => p.pageNum < curPage);
    if (idx < 0) return;
    const targetPage = paragraphs[paragraphs.length - 1 - idx].pageNum;
    const first = paragraphs.findIndex(p => p.pageNum === targetPage);
    if (first >= 0) jumpTo(first);
  });
  nextPageBtn.addEventListener('click', () => {
    const curPage = paragraphs[currentIdx].pageNum;
    const idx = paragraphs.findIndex(p => p.pageNum > curPage);
    if (idx >= 0) jumpTo(idx);
  });

  function jumpTo(idx) {
    stopAll(); currentIdx = idx;
    renderList(); updateProgress(); updatePageInfo(); saveProgress();
  }
  speedSlider.addEventListener('input', () => {
    currentRate = speedSlider.value / 10;
    speedVal.textContent = currentRate.toFixed(1) + 'x';
    audioEl.playbackRate = currentRate;
  });

  /* ===================== PLAYBACK ===================== */
  function play()  { isPlaying = true;  playBtn.textContent = '⏸'; speakCurrent(); }
  function pause() {
    isPlaying = false; playBtn.textContent = '▶';
    audioEl.pause();
    if (ttsMode === 'webspeech') speechSynthesis.pause();
  }
  function stopAll() {
    audioEl.pause(); audioEl.src = '';
    speechSynthesis.cancel();
    if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }
    prefetch = null;
  }

  async function speakCurrent() {
    if (!isPlaying || currentIdx >= paragraphs.length) {
      if (currentIdx >= paragraphs.length) {
        isPlaying = false; playBtn.textContent = '▶';
        showToast('読み上げが完了しました ✓'); clearProgress();
      }
      return;
    }
    const para = paragraphs[currentIdx];
    renderList(); updateProgress(); updatePageInfo(); updateMediaSession(para.text); saveProgress();

    if (ttsMode === 'googletts') await speakGoogleTTS(para.text);
    else speakWebSpeech(para.text);
  }

  /* ===================== GOOGLE CLOUD TTS ===================== */
  async function fetchGoogleTTS(text) {
    // 漢字→ひらがな変換（kuroshiro準備完了時のみ）
    const kana = await toKana(text);
    const res = await fetch(
      `https://texttospeech.googleapis.com/v1/text:synthesize?key=${GOOGLE_TTS_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          input: { text: kana },
          voice: { languageCode: 'ja-JP', name: googleVoiceName },
          audioConfig: { audioEncoding: 'MP3', speakingRate: currentRate }
        })
      }
    );
    if (!res.ok) { const e = await res.text().catch(() => ''); throw new Error(`TTS HTTP ${res.status}: ${e}`); }
    const data = await res.json();
    if (!data.audioContent) throw new Error('audioContentが空です');
    const bin = atob(data.audioContent);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return new Blob([buf], { type: 'audio/mpeg' });
  }

  async function speakGoogleTTS(text) {
    try {
      let blob;
      if (prefetch && prefetch.index === currentIdx) { blob = prefetch.blob; prefetch = null; }
      else blob = await fetchGoogleTTS(text);
      if (!isPlaying) return;
      if (blobUrl) URL.revokeObjectURL(blobUrl);
      blobUrl = URL.createObjectURL(blob);
      audioEl.src = blobUrl; audioEl.playbackRate = 1.0;
      audioEl.onended = () => {
        if (!isPlaying) return;
        // 同じページの次の段落へ、またはページが変わったら自動で次ページ先頭へ
        const nextIdx = currentIdx + 1;
        if (nextIdx < paragraphs.length) { currentIdx = nextIdx; speakCurrent(); }
        else { isPlaying = false; playBtn.textContent = '▶'; showToast('読み上げが完了しました ✓'); clearProgress(); }
      };
      audioEl.onerror = () => { if (isPlaying) { currentIdx++; speakCurrent(); } };
      await audioEl.play();
      // 先読み
      const ni = currentIdx + 1;
      if (ni < paragraphs.length) {
        fetchGoogleTTS(paragraphs[ni].text).then(b => { prefetch = { index: ni, blob: b }; }).catch(() => {});
      }
    } catch (err) {
      console.warn('Google TTS失敗:', err);
      ttsMode = 'webspeech';
      ttsBadge.className   = 'tts-badge fallback';
      ttsBadge.textContent = '🔈 ブラウザ内蔵音声（バックグラウンド再生不可）';
      showToast('Google TTS失敗。ブラウザ音声に切り替えました');
      switchToWebSpeechVoices();
      speakWebSpeech(paragraphs[currentIdx].text);
    }
  }

  /* ===================== Web Speech API ===================== */
  function speakWebSpeech(text) {
    speechSynthesis.cancel();
    const utt   = new SpeechSynthesisUtterance(text);
    utt.lang    = 'ja-JP'; utt.rate = currentRate;
    if (wsVoices.length > 0) utt.voice = wsVoices[wsVoiceIdx] || wsVoices[0];
    utt.onend   = () => { if (isPlaying) { currentIdx++; speakCurrent(); } };
    utt.onerror = () => { if (isPlaying) { currentIdx++; speakCurrent(); } };
    speechSynthesis.speak(utt);
  }

  /* ===================== MEDIA SESSION ===================== */
  function updateMediaSession(text) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({ title: 'PDF音読中', artist: text.substring(0, 60), album: filenameEl.textContent });
    navigator.mediaSession.setActionHandler('play',  play);
    navigator.mediaSession.setActionHandler('pause', pause);
    navigator.mediaSession.setActionHandler('previoustrack', () => {
      if (currentIdx > 0) { stopAll(); currentIdx--; renderList(); updateProgress(); updatePageInfo(); saveProgress(); if (isPlaying) speakCurrent(); }
    });
    navigator.mediaSession.setActionHandler('nexttrack', () => {
      if (currentIdx < paragraphs.length - 1) { stopAll(); currentIdx++; renderList(); updateProgress(); updatePageInfo(); saveProgress(); if (isPlaying) speakCurrent(); }
    });
  }

  /* ===================== WAKE LOCK ===================== */
  let wakeLock = null;
  async function requestWakeLock() { if ('wakeLock' in navigator) try { wakeLock = await navigator.wakeLock.request('screen'); } catch (_) {} }
  document.addEventListener('visibilitychange', async () => { if (document.visibilityState === 'visible' && isPlaying) await requestWakeLock(); });
  playBtn.addEventListener('click', () => { if (!isPlaying) requestWakeLock(); });

  /* ===================== UTILS ===================== */
  function showLoading(msg) { loadingText.textContent = msg; loadingOverlay.classList.add('show'); }
  function hideLoading()    { loadingOverlay.classList.remove('show'); }
  let toastTimer;
  function showToast(msg) {
    toastEl.textContent = msg; toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
